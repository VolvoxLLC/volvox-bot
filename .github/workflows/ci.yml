name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm mono:lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage (bot)
        run: pnpm test:coverage

      - name: Test (web)
        run: pnpm --prefix web test

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage/lcov.info

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: error
          retention-days: 7

  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm mono:typecheck

      - name: Build
        run: pnpm mono:build

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, test, build, docker-build-validation]
    if: ${{ always() }}

    steps:
      - name: Gate required checks
        run: |
          echo "lint result: ${{ needs.lint.result }}"
          echo "test result: ${{ needs.test.result }}"
          echo "build result: ${{ needs.build.result }}"
          echo "docker result: ${{ needs.docker-build-validation.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more checks failed."
            exit 1
          fi

          if [ "${{ needs.docker-build-validation.result }}" != "success" ]; then
            echo "Docker build validation failed."
            exit 1
          fi

  docker-build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build bot Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: Dockerfile
          push: false
          tags: volvox-bot-ci:${{ github.sha }}
          cache-from: type=gha,scope=volvox-bot
          cache-to: type=gha,mode=max,scope=volvox-bot

      - name: Build web Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: web
          file: web/Dockerfile
          push: false
          tags: volvox-web-ci:${{ github.sha }}
          cache-from: type=gha,scope=volvox-web
          cache-to: type=gha,mode=max,scope=volvox-web
