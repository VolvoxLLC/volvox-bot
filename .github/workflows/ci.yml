name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm mono:lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage (bot)
        run: pnpm test:coverage

      - name: Test with coverage (web)
        run: pnpm --prefix web test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: coverage/lcov.info web/coverage/lcov.info

      - name: Upload coverage artifacts (bot)
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage artifacts (web)
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: web-coverage-${{ github.run_id }}
          path: web/coverage/
          if-no-files-found: error
          retention-days: 7

  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm mono:typecheck

      - name: Build
        run: pnpm mono:build

  e2e:
    name: E2E Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install web dependencies
        run: pnpm --prefix web install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --prefix web exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --prefix web exec playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }})
        run: pnpm --prefix web test:e2e --shard=${{ matrix.shard }}
        env:
          NEXT_FONT_GOOGLE_MOCKED: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}-${{ strategy.job-index }}
          path: |
            web/playwright-report/
            web/blob-report/
          retention-days: 7

  sonarcloud-gate:
    name: SonarCloud Gate
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
      pull-requests: read
      statuses: read
    # SonarCloud Automatic Analysis publishes this external check for the same
    # commit SHA. This job does not run analysis; it only waits for the external
    # check/status so the aggregate required `CI` job still enforces SonarCloud.
    steps:
      - name: Wait for SonarCloud Code Analysis
        uses: actions/github-script@v8
        env:
          SONAR_CHECK_NAME: SonarCloud Code Analysis
          SONAR_MAX_ATTEMPTS: "45"
          SONAR_POLL_SECONDS: "20"
        with:
          script: |
            const checkName = process.env.SONAR_CHECK_NAME;
            const maxAttempts = Number(process.env.SONAR_MAX_ATTEMPTS);
            const pollSeconds = Number(process.env.SONAR_POLL_SECONDS);
            const pullRequest = context.payload.pull_request;
            const isForkPullRequest = Boolean(
              pullRequest?.head?.repo?.full_name &&
                pullRequest.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`,
            );

            // Fork PRs do not have the repository app/secret context required for
            // SonarCloud Automatic Analysis to publish the external check. Match
            // the old scanner policy by soft-passing instead of timing out here.
            if (isForkPullRequest) {
              core.info(
                `${checkName} is skipped for fork pull request #${pullRequest.number} ` +
                  `from ${pullRequest.head.repo.full_name}; SonarCloud Automatic Analysis ` +
                  'is enforced only for same-repository pull requests and main pushes.',
              );
              return;
            }

            const ref = context.payload.pull_request?.head?.sha ?? context.sha;
            const repositories = [context.repo];

            if (context.payload.pull_request?.head?.repo?.full_name) {
              const [headOwner, headRepo] = context.payload.pull_request.head.repo.full_name.split('/');
              if (headOwner !== context.repo.owner || headRepo !== context.repo.repo) {
                repositories.push({ owner: headOwner, repo: headRepo });
              }
            }

            const sleep = (seconds) => new Promise((resolve) => setTimeout(resolve, seconds * 1000));
            const timestamp = (candidate) => Date.parse(
              candidate.completedAt ?? candidate.startedAt ?? candidate.updatedAt ?? candidate.createdAt ?? 0,
            );
            const latestFirst = (a, b) => timestamp(b) - timestamp(a);

            async function readRepositoryCandidates(repository) {
              try {
                const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                  ...repository,
                  ref,
                  check_name: checkName,
                  per_page: 100,
                });
                const combinedStatus = await github.rest.repos.getCombinedStatusForRef({
                  ...repository,
                  ref,
                });

                return [
                  ...checkRuns
                    .filter((run) => run.name === checkName)
                    .map((run) => ({
                      type: 'check-run',
                      state: run.status,
                      conclusion: run.conclusion,
                      url: run.html_url,
                      startedAt: run.started_at,
                      completedAt: run.completed_at,
                    })),
                  ...combinedStatus.data.statuses
                    .filter((status) => status.context === checkName)
                    .map((status) => ({
                      type: 'status',
                      state: status.state,
                      url: status.target_url,
                      updatedAt: status.updated_at,
                      createdAt: status.created_at,
                    })),
                ];
              } catch (error) {
                core.info(
                  `Could not read checks for ${repository.owner}/${repository.repo}@${ref}: ` +
                    `${error.status ?? 'unknown'} ${error.message}`,
                );
                return [];
              }
            }

            async function findSonarCloudCandidates() {
              const candidateGroups = await Promise.all(
                repositories.map((repository) => readRepositoryCandidates(repository)),
              );

              return candidateGroups.flat().sort(latestFirst);
            }

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const candidates = await findSonarCloudCandidates();
              const latest = candidates[0];

              if (!latest) {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: ${checkName} is not published for ${ref} yet.`,
                );
              } else if (latest.type === 'check-run') {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: ${checkName} check-run is ` +
                    `${latest.state}/${latest.conclusion ?? 'pending'} (${latest.url ?? 'no url'}).`,
                );

                if (latest.state === 'completed' && latest.conclusion === 'success') {
                  core.info(`${checkName} passed for ${ref}.`);
                  return;
                }

                if (latest.state === 'completed') {
                  core.setFailed(`${checkName} concluded with ${latest.conclusion ?? 'unknown'}.`);
                  return;
                }
              } else {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: ${checkName} status is ` +
                    `${latest.state} (${latest.url ?? 'no url'}).`,
                );

                if (latest.state === 'success') {
                  core.info(`${checkName} passed for ${ref}.`);
                  return;
                }

                if (latest.state === 'failure' || latest.state === 'error') {
                  core.setFailed(`${checkName} status concluded with ${latest.state}.`);
                  return;
                }
              }

              if (attempt < maxAttempts) {
                await sleep(pollSeconds);
              }
            }

            core.setFailed(
              `${checkName} was missing or did not complete successfully for ${ref} ` +
                `within ${maxAttempts * pollSeconds} seconds.`,
            );

  ci:
    name: CI
    runs-on: ubuntu-latest
    # SonarCloud quality analysis is handled by the external SonarCloud Automatic
    # Analysis check. Do not run SonarSource/sonarqube-scan-action here unless
    # Automatic Analysis is disabled in SonarCloud; SonarCloud rejects duplicate
    # automatic + CI analyses and fails this aggregate gate.
    needs: [lint, test, build, e2e, docker-build-validation, sonarcloud-gate]
    if: ${{ always() }}

    steps:
      - name: Gate required checks
        run: |
          echo "lint result: ${{ needs.lint.result }}"
          echo "test result: ${{ needs.test.result }}"
          echo "build result: ${{ needs.build.result }}"
          echo "e2e result: ${{ needs.e2e.result }}"
          echo "docker result: ${{ needs.docker-build-validation.result }}"
          echo "sonarcloud result: ${{ needs.sonarcloud-gate.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ] || \
             [ "${{ needs.sonarcloud-gate.result }}" != "success" ]; then
            echo "One or more checks failed."
            exit 1
          fi

          if [ "${{ needs.docker-build-validation.result }}" != "success" ]; then
            echo "Docker build validation failed."
            exit 1
          fi

  docker-build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build bot Docker image
        run: docker build --tag volvox-bot-ci:${{ github.sha }} --file Dockerfile .

      - name: Build web Docker image
        run: docker build --tag volvox-web-ci:${{ github.sha }} --file web/Dockerfile web
