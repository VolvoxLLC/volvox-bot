name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Sonar coverage exclusions
        run: pnpm sonar:check-coverage-exclusions

      - name: Lint (Biome)
        run: pnpm mono:lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check provider catalog snapshot
        run: pnpm providers:check

      - name: Test with coverage (bot)
        run: pnpm test:coverage

      - name: Test with coverage (web)
        run: pnpm --prefix web test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: coverage/lcov.info web/coverage/lcov.info

      - name: Upload coverage artifacts (bot)
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage artifacts (web)
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: web-coverage-${{ github.run_id }}
          path: web/coverage/
          if-no-files-found: error
          retention-days: 7

  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm mono:typecheck

      - name: Build
        run: pnpm mono:build

  e2e:
    name: E2E Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install web dependencies
        run: pnpm --prefix web install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --prefix web exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --prefix web exec playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }})
        run: pnpm --prefix web test:e2e --shard=${{ matrix.shard }}
        env:
          NEXT_FONT_GOOGLE_MOCKED: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}-${{ strategy.job-index }}
          path: |
            web/playwright-report/
            web/blob-report/
          retention-days: 7

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e, sonarqube, docker-build-validation]
    if: ${{ always() }}

    steps:
      - name: Gate required checks
        run: |
          echo "lint result: ${{ needs.lint.result }}"
          echo "test result: ${{ needs.test.result }}"
          echo "build result: ${{ needs.build.result }}"
          echo "e2e result: ${{ needs.e2e.result }}"
          echo "sonarqube result: ${{ needs.sonarqube.result }}"
          echo "docker result: ${{ needs.docker-build-validation.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more checks failed."
            exit 1
          fi

          sonarqube_result="${{ needs.sonarqube.result }}"
          sonarqube_skipped_for_fork="${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo != null && github.event.pull_request.head.repo.fork }}"
          if [ "$sonarqube_result" != "success" ]; then
            if [ "$sonarqube_result" = "skipped" ] && [ "$sonarqube_skipped_for_fork" = "true" ]; then
              echo "SonarQube skipped on fork PR — allowed."
            else
              echo "SonarQube scan failed or unexpectedly skipped."
              exit 1
            fi
          fi

          if [ "${{ needs.docker-build-validation.result }}" != "success" ]; then
            echo "Docker build validation failed."
            exit 1
          fi

  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo != null && github.event.pull_request.head.repo.fork == false)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifacts (bot)
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/

      - name: Download coverage artifacts (web)
        uses: actions/download-artifact@v8.0.1
        with:
          name: web-coverage-${{ github.run_id }}
          path: web/coverage/

      - name: SonarQube Scan
        # Pinned to v6.0.0 because no v6.1.0 tag exists upstream.
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  docker-build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build bot Docker image
        run: docker build --tag volvox-bot-ci:${{ github.sha }} --file Dockerfile .

      - name: Build web Docker image
        run: docker build --tag volvox-web-ci:${{ github.sha }} --file web/Dockerfile web
