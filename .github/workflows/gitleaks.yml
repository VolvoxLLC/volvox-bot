name: Secret Scanning

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # run once a day at 4 AM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "${archive}"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            --output checksums.txt
          grep " ${archive}$" checksums.txt | sha256sum --check --strict
          tar -xzf "${archive}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
        run: |
          set -euo pipefail

          gitleaks_flags=(--config .gitleaks.toml --redact --verbose)

          echo "Scanning final working tree"
          gitleaks dir . "${gitleaks_flags[@]}"

          case "${EVENT_NAME}" in
            pull_request)
              if [[ -z "${PR_BASE_SHA}" ]]; then
                echo "Skipping commit-range scan: pull_request base SHA is unavailable"
                exit 0
              fi

              echo "Scanning pull request commit range ${PR_BASE_SHA}..HEAD"
              gitleaks git . --log-opts="${PR_BASE_SHA}..HEAD" "${gitleaks_flags[@]}"
              ;;
            push)
              if [[ -z "${PUSH_BEFORE_SHA}" || "${PUSH_BEFORE_SHA}" =~ ^0+$ ]]; then
                echo "Skipping commit-range scan: push before SHA is unavailable or all-zero"
                exit 0
              fi

              echo "Scanning push commit range ${PUSH_BEFORE_SHA}..HEAD"
              gitleaks git . --log-opts="${PUSH_BEFORE_SHA}..HEAD" "${gitleaks_flags[@]}"
              ;;
            *)
              echo "Skipping commit-range scan for ${EVENT_NAME} event"
              ;;
          esac
