name: Claude Code Review

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]

#concurrency:
#  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}-${{ github.actor }}
#  cancel-in-progress: true

jobs:
  claude-review:
    if: 
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body || '', '@claude')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body || '', '@claude')
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body || '', '@claude')
      )

    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1.0.89
        env:
          PR_NUMBER: ${{ github.event.pull_request.number && github.event.pull_request.number || github.event.issue.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Run /code-review --comment on PR #${{ env.PR_NUMBER }} in ${{ github.repository }}.

            You are an expert core reviewer that has been tasked with reviewing a GitHub Pull Request for a Discord bot called Volvox.Bot.

            In addition to CLAUDE.md and AGENTS.md (which the plugin reads automatically),
            enforce these project-specific rules that the plugin cannot infer:

            HARD RULES (flag as high-confidence issues):
            • Winston logger only — zero console.log/warn/error in src/ files
            • ESM only — no require(), use node: protocol for builtins
            • Config via getConfig(), mutations via setConfigValue() — never import config.json directly
            • Custom error classes from src/utils/errors.js — no raw throw new Error()
            • Parameterized SQL only — no string interpolation in queries
            • New modules must be registered in src/modules/events.js
            • Test coverage must stay ≥ 80% (statements, branches, functions, lines)

            DISCORD-SPECIFIC RULES:
            • Messages over 2000 chars must use the splitMessage utility
            • New gateway events require matching intent declarations
            • Moderation commands: DM the target before kick/ban, use ephemeral replies
            • Duration caps: timeout ≤ 28d, slowmode ≤ 6h

            DOCS:
            • AGENTS.md must be updated when new files or patterns are added
            • README.md updated with new files and patterns
            • .env.example must be updated when new env vars are introduced

            OUTPUT RULES:
            • ONLY report issues — zero praise, positives, or compliments
            • If zero issues found, do NOT post a comment — just approve silently

            INLINE COMMENTS:
            After completing the review, post inline PR review comments for EVERY issue found.
            Use the GitHub CLI to submit a single review with inline comments on the exact files and lines:

            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/reviews \
              -X POST \
              -f event="REQUEST_CHANGES" \
              -f body="Code review complete. See inline comments for issues and AI fix prompts." \
              --json comments -f comments='[...array of comment objects...]'
            ```

            Each inline comment object must have: path, line (or start_line + line for ranges), and body.

            FORMAT FOR EACH INLINE COMMENT:
            Every inline comment body MUST follow this exact format:

            ```
            **🔴 Issue:** <concise description of the problem>

            **Rule:** <which rule from the list above this violates>

            **Why:** <brief explanation of why this is a problem>

            <details>
            <summary>🤖 AI Fix Prompt (copy & paste to your AI agent)</summary>

            \`\`\`
            In the file `<file_path>`, at line <line_number>:

            <describe the exact issue found>

            Fix this by <specific instructions for what to change>. Make sure to:
            - <specific requirement 1>
            - <specific requirement 2>
            - <any other relevant constraints from the project rules>

            Do not change any other logic. Only fix this specific issue.
            \`\`\`

            </details>
            ```

            The AI Fix Prompt inside the collapsible section must be:
            - Self-contained — an AI agent should be able to fix the issue with ONLY this prompt
            - Specific — include the exact file path, line number, current problematic code, and what to replace it with
            - Actionable — use imperative verbs (replace, change, wrap, add, remove)
            - Scoped — tell the agent to only fix this one issue, not refactor surrounding code
            - Context-aware — reference project-specific utilities, patterns, or imports the fix should use
              (e.g., "import logger from '../../logger.js'", "use ConfigurationError from '../../utils/errors.js'")

            EXAMPLES OF GOOD AI FIX PROMPTS:

            For a console.log violation:
            ```
            In the file `src/modules/greetings.js`, at line 42:

            `console.log('User joined:', member.user.tag)` violates the Winston-only logging rule.

            Fix this by replacing `console.log(...)` with `logger.info(...)`. Add `import logger from '../../logger.js'` at the top of the file if not already imported. Keep the same log message content.

            Do not change any other logic. Only fix this specific issue.
            ```

            For a raw Error throw:
            ```
            In the file `src/commands/ban.js`, at line 87:

            `throw new Error('Invalid duration')` uses a raw Error instead of a custom error class.

            Fix this by replacing `throw new Error('Invalid duration')` with `throw new ValidationError('Invalid duration')`. Add `import { ValidationError } from '../../utils/errors.js'` at the top of the file if not already imported.

            Do not change any other logic. Only fix this specific issue.
            ```

            If zero issues are found, do NOT post any comments — just approve silently:
            `gh pr review ${{ env.PR_NUMBER }} --approve`
