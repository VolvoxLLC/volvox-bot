# Project configuration
sonar.projectKey=VolvoxLLC_volvox-bot
sonar.organization=volvox
sonar.projectName=volvox-bot
sonar.projectVersion=1.0

# Code paths
sonar.sources=src,web/src
sonar.tests=tests,web/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx
# Keep Sonar's quality gate focused on production code. Files under test roots intentionally
# contain helpers, fixtures, RFC/private IP ranges, temp directories, and duplicated assertions.
# Coverage is still imported from LCOV for production sources below.
sonar.test.exclusions=tests/**,web/tests/**

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/out/**,**/.turbo/**,**/coverage/**,**/migrations/**,**/.changeset/**

# JS/TS configuration
sonar.javascript.node.maxspace=4096
sonar.typescript.tsconfigPath=web/tsconfig.json
sonar.sourceEncoding=UTF-8

# CPD exclusions are owned by CI/Sonar maintainers and limited to reviewed duplication.
# Generated provider snapshots mirror src/data/providers.json; sync is enforced by pnpm providers:check.
# Telemetry privacy scrubbers intentionally mirror bot/web redaction logic to keep bundles independent.
# Test and migration trees intentionally repeat fixtures, cases, and schema boilerplate.
sonar.cpd.exclusions=web/src/data/providers.json,**/web/src/data/providers.json,src/sentry.js,**/src/sentry.js,src/amplitude.js,**/src/amplitude.js,web/src/lib/amplitude.ts,**/web/src/lib/amplitude.ts,web/src/lib/sentry-options.ts,**/web/src/lib/sentry-options.ts,**/tests/**,**/migrations/**

# Narrowly accept remaining reviewed hotspots from nightly CI without weakening coverage.
# Docker runtime stages remove write bits after COPY; web recursive COPY is constrained by web/.dockerignore.
# GitHub Actions are pinned to reviewed major versions and maintained by Dependabot.
# Randomness below is used only for XP/message variety, UI preview IDs, and decorative landing-page data.
sonar.issue.ignore.multicriteria=dockerCopyPermissions,webDockerCopyPermissions,webDockerRecursiveCopy,githubActionPins,reputationRandomness,welcomeRandomness,webUiRandomness,landingDecorativeRandomness
sonar.issue.ignore.multicriteria.dockerCopyPermissions.ruleKey=docker:S6504
sonar.issue.ignore.multicriteria.dockerCopyPermissions.resourceKey=Dockerfile
sonar.issue.ignore.multicriteria.webDockerCopyPermissions.ruleKey=docker:S6504
sonar.issue.ignore.multicriteria.webDockerCopyPermissions.resourceKey=web/Dockerfile
sonar.issue.ignore.multicriteria.webDockerRecursiveCopy.ruleKey=docker:S6470
sonar.issue.ignore.multicriteria.webDockerRecursiveCopy.resourceKey=web/Dockerfile
sonar.issue.ignore.multicriteria.githubActionPins.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.githubActionPins.resourceKey=.github/workflows/*.yml
sonar.issue.ignore.multicriteria.reputationRandomness.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.reputationRandomness.resourceKey=src/modules/reputation.js
sonar.issue.ignore.multicriteria.welcomeRandomness.ruleKey=javascript:S2245
sonar.issue.ignore.multicriteria.welcomeRandomness.resourceKey=src/modules/welcome.js
sonar.issue.ignore.multicriteria.webUiRandomness.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.webUiRandomness.resourceKey=web/src/components/dashboard/config-editor-utils.ts
sonar.issue.ignore.multicriteria.landingDecorativeRandomness.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.landingDecorativeRandomness.resourceKey=web/src/components/landing/bento/*

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info,web/coverage/lcov.info
