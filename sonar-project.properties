# Project configuration
sonar.projectKey=VolvoxLLC_volvox-bot
sonar.organization=volvox
sonar.projectName=volvox-bot
sonar.projectVersion=1.0

# Code paths
sonar.sources=src,web/src
sonar.tests=tests,web/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/out/**,**/.turbo/**,**/coverage/**,**/migrations/**,**/.changeset/**

# JS/TS configuration
sonar.javascript.node.maxspace=4096
sonar.typescript.tsconfigPath=web/tsconfig.json
sonar.sourceEncoding=UTF-8

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info,web/coverage/lcov.info
sonar.coverage.exclusions=web/src/types/**,web/src/app/**/page.tsx,web/src/app/**/layout.tsx,web/src/app/**/loading.tsx,web/src/app/**/error.tsx,web/src/app/global-error.tsx,web/src/app/globals.css,web/src/stores/**,web/src/components/ui/**,web/src/components/error-card.tsx,web/src/components/theme-provider.tsx,web/src/components/dashboard/**,web/src/components/landing/index.ts,web/src/components/landing/bento/BentoChart.tsx,web/src/components/landing/bento/BentoModeration.tsx,web/src/components/landing/bento/BentoAIChat.tsx,web/src/components/landing/bento/BentoConversations.tsx,web/src/components/layout/mobile-sidebar.tsx,web/src/hooks/use-moderation-cases.ts,web/src/hooks/use-moderation-stats.ts,web/src/hooks/use-user-history.ts,web/src/lib/log-ws.ts,web/src/lib/logger.ts
